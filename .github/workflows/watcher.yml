name: Car Watcher

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-watcher:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright browsers
        run: | 
          python -m playwright install chromium

      - name: Run watcher
        run: |
          python watcher_playwright.py
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Check storage.json
        run: |
          echo "📊 Storage.json contents:"
          cat storage.json

      - name: Commit and push storage.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add storage.json
          git commit -m "🚗 Update storage: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workflow Summary
        if: always()
        run: |
          echo "✅ Car Watcher Workflow Summary"
          echo "================================"
          echo "⏰ Run time: $(date +'%Y-%m-%d %H:%M:%S')"
          echo "📧 Email recipients: ${{ secrets.EMAIL_TO }}"
          echo "🔍 Check above logs for email status"